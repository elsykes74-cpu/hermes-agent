model:
  default: claude-sonnet-4-6
providers: {}
fallback_providers: []
credential_pool_strategies: {}
toolsets:
- hermes-cli
agent:
  max_turns: 40
  gateway_timeout: 0
  restart_drain_timeout: 60
  api_max_retries: 3
  service_tier: ''
  tool_use_enforcement: auto
  gateway_timeout_warning: 0
  clarify_timeout: 300
  gateway_notify_interval: 120
  gateway_auto_continue_freshness: 3600
  image_input_mode: auto
  disabled_toolsets: []
compression:
  enabled: true
  threshold: 0.7
  target_ratio: 0.3
  protect_last_n: 10
  hygiene_hard_message_limit: 150
  protect_first_n: 2
  abort_on_summary_failure: false
auxiliary:
  vision:
    provider: anthropic
    model: ''
    base_url: ''
    api_key: ''
    timeout: 120
    extra_body: {}
    download_timeout: 30
  web_extract:
    provider: anthropic
    model: ''
    base_url: ''
    api_key: ''
    timeout: 360
    extra_body: {}
  compression:
    provider: anthropic
    model: ''
    base_url: ''
    api_key: ''
    timeout: 120
    extra_body: {}
  skills_hub:
    provider: anthropic
    model: ''
    base_url: ''
    api_key: ''
    timeout: 30
    extra_body: {}
  approval:
    provider: anthropic
    model: ''
    base_url: ''
    api_key: ''
    timeout: 30
    extra_body: {}
  mcp:
    provider: anthropic
    model: ''
    base_url: ''
    api_key: ''
    timeout: 30
    extra_body: {}
  title_generation:
    provider: anthropic
    model: ''
    base_url: ''
    api_key: ''
    timeout: 30
    extra_body: {}
  triage_specifier:
    provider: anthropic
    model: ''
    base_url: ''
    api_key: ''
    timeout: 120
    extra_body: {}
  kanban_decomposer:
    provider: anthropic
    model: ''
    base_url: ''
    api_key: ''
    timeout: 180
    extra_body: {}
  profile_describer:
    provider: anthropic
    model: ''
    base_url: ''
    api_key: ''
    timeout: 60
    extra_body: {}
  curator:
    provider: anthropic
    model: ''
    base_url: ''
    api_key: ''
    timeout: 600
    extra_body: {}
memory:
  memory_enabled: true
  user_profile_enabled: true
  memory_char_limit: 2200
  user_char_limit: 1375
  provider: ''
logging:
  level: INFO
  max_size_mb: 5
  backup_count: 3
  memory_monitor:
    enabled: true
    interval_seconds: 300
telegram:
  reactions: false
  channel_prompts: {}
  allowed_chats: ''
platform_toolsets:
  telegram:
  - hermes-telegram
approvals:
  mode: manual
  timeout: 60
  cron_mode: deny
sessions:
  auto_prune: false
  retention_days: 90
