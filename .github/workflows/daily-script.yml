name: Elvis Daily Script

on:
  schedule:
    - cron: '0 13 * * *'
  workflow_dispatch:

jobs:
  generate-and-send:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests google-cloud-storage

      - name: Generate script and deliver to QuickKick
        working-directory: elvis-daily-script
        run: python generate_script.py
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          QUICKKICK_API_URL: ${{ secrets.QUICKKICK_API_URL }}
          QUICKKICK_API_KEY: ${{ secrets.QUICKKICK_API_KEY }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
